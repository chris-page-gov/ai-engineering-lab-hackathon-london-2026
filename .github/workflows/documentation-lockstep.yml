name: Documentation Lockstep

on:
  pull_request:

jobs:
  documentation-lockstep:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=1

      - name: Check tracking docs
        run: python3 tools/check_documentation_lockstep.py --base "origin/${{ github.base_ref }}...HEAD"
