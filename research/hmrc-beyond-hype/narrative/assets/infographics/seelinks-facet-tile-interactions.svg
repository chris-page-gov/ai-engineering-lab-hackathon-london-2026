<polygon points="330,418 320,412 320,424" fill="#33645d"/>
<text x="348" y="424" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">highlight matching records; count shows</text>
<text x="348" y="443" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">highlighted/total when active</text>
