<polygon points="330,498 320,492 320,504" fill="#33645d"/>
<text x="348" y="504" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">adjust additive highlights within the same</text>
<text x="348" y="523" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">facet</text>
