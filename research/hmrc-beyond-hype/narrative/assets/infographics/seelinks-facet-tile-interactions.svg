<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<title>SeeLinks facet and tile interactions</title>
<rect width="100%" height="100%" fill="#f7faf8"/>
<rect x="24" y="20" width="1552" height="78" rx="10" fill="#ffffff" stroke="#a9bdb8" stroke-width="2"/>
<text x="48" y="55" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="0" fill="#132f2a">Facet And Tile Interaction Model</text>
<text x="48" y="82" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#3d5b55">The original SeeLinks UI is built around highlighting, reducing, ordering, colouring, and collecting visible records.</text>
<rect x="48" y="132" width="340" height="180" rx="14" fill="#eef5f2" stroke="#9db9b2" stroke-width="2"/>
<text x="72" y="168" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="0" fill="#1c2f2b">Facet header</text>
<text x="72" y="202" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">Click opens or closes. Pin keeps</text>
<text x="72" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">it open. Drag header reorders</text>
<text x="72" y="242" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">facets. Drag facet name to the</text>
<text x="72" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">grid pins it and colours tiles.</text>
<rect x="424" y="132" width="340" height="180" rx="14" fill="#eef4fb" stroke="#9db9b2" stroke-width="2"/>
<text x="448" y="168" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="0" fill="#1c2f2b">Facet value chip</text>
<text x="448" y="202" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">Click sets primary highlight.</text>
<text x="448" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">Right-click Adjust adds/removes</text>
<text x="448" y="242" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">within the facet. Double-click</text>
<text x="448" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">chooses that value. Drag reorders</text>
<text x="448" y="282" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">values or creates grid rollup.</text>
<rect x="800" y="132" width="340" height="180" rx="14" fill="#fff7e8" stroke="#9db9b2" stroke-width="2"/>
<text x="824" y="168" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="0" fill="#1c2f2b">Tile grid</text>
<text x="824" y="202" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">Single click selects. Double click</text>
<text x="824" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">opens. Drop facet names for colour</text>
<text x="824" y="242" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">legends. Drop facet values for</text>
<text x="824" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">rollup cards.</text>
<rect x="1176" y="132" width="340" height="180" rx="14" fill="#f7ecf1" stroke="#9db9b2" stroke-width="2"/>
<text x="1200" y="168" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="0" fill="#1c2f2b">Toolbar/history</text>
<text x="1200" y="202" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">Choose highlighted reduces to</text>
<text x="1200" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">matches. Choose unhighlighted</text>
<text x="1200" y="242" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">keeps non-matches. Undo view and</text>
<text x="1200" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">history chips restore prior</text>
<text x="1200" y="282" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#24413c">reductions.</text>
<text x="56" y="374" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#1c2f2b">Core gestures</text>
