<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
<title>SeeLinks views and detail surfaces</title>
<rect width="100%" height="100%" fill="#f7faf8"/>
<rect x="24" y="20" width="1552" height="78" rx="10" fill="#ffffff" stroke="#a9bdb8" stroke-width="2"/>
<text x="48" y="55" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="0" fill="#132f2a">Views, Detail Surfaces, And Output Tools</text>
<text x="48" y="82" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#3d5b55">Every visible surface has a role: browse, narrow, inspect, collect, print, export, or edit.</text>
<rect x="54" y="142" width="270" height="150" rx="14" fill="#e4f2ee" stroke="#8baaa4" stroke-width="2"/>
<text x="76" y="180" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Grid</text>
<text x="76" y="212" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Default records viewer. Tile</text>
<text x="76" y="231" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">image/icon plus</text>
<text x="76" y="250" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">title/subtitle; selection,</text>
<text x="76" y="269" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">highlight, active, colour,</text>
<text x="76" y="288" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">rollup states.</text>
<rect x="356" y="142" width="270" height="150" rx="14" fill="#e6eefb" stroke="#8baaa4" stroke-width="2"/>
<text x="378" y="180" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Outline</text>
<text x="378" y="212" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Category hierarchy view for</text>
<text x="378" y="231" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">slash-delimited category</text>
<text x="378" y="250" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">paths.</text>
<rect x="658" y="142" width="270" height="150" rx="14" fill="#fff1d1" stroke="#8baaa4" stroke-width="2"/>
<text x="680" y="180" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Graph</text>
<text x="680" y="212" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Knowledge graph summary of</text>
<text x="680" y="231" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">item/facet/link structure.</text>
<rect x="960" y="142" width="270" height="150" rx="14" fill="#fde7ef" stroke="#8baaa4" stroke-width="2"/>
<text x="982" y="180" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Timeline</text>
<text x="982" y="212" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Dated entries view when date-</text>
<text x="982" y="231" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">like fields exist.</text>
<rect x="1262" y="142" width="270" height="150" rx="14" fill="#eee8fb" stroke="#8baaa4" stroke-width="2"/>
<text x="1284" y="180" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Reading</text>
<text x="1284" y="212" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Reader mode for longer text-</text>
<text x="1284" y="231" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">oriented packs.</text>
<rect x="54" y="340" width="698" height="560" rx="14" fill="#ffffff" stroke="#9bb8b2" stroke-width="2"/>
<text x="88" y="382" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="0" fill="#1c2f2b">Docked detail card</text>
<rect x="90" y="420" width="616" height="62" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="112" y="446" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Tile strip</text>
<text x="260" y="444" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Horizontal navigation through the current view;</text>
<text x="260" y="462" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">accepts facet/facet-value drops like the main grid.</text>
<rect x="90" y="506" width="616" height="62" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="112" y="532" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Header</text>
<text x="260" y="530" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Item title, category path, Previous, Next, Close.</text>
<rect x="90" y="592" width="616" height="62" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="112" y="618" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Overview tab</text>
<text x="260" y="616" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Pack-specific detail layouts: UK Public AI, World</text>
<text x="260" y="634" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Pulse metrics, Wikipedia, Micropedia, Pond Watch,</text>
<text x="260" y="652" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">API calls, fallback summary.</text>
<rect x="90" y="678" width="616" height="62" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="112" y="704" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Images tab</text>
<text x="260" y="702" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Image gallery with captions; hero image double-click</text>
<text x="260" y="720" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">jumps here.</text>
<rect x="90" y="764" width="616" height="62" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="112" y="790" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Related/resources</text>
<text x="260" y="788" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Related rows, source links, Wikipedia/Wikidata/Data</text>
<text x="260" y="806" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#24413c">Commons/API links when present.</text>
<rect x="804" y="340" width="742" height="560" rx="14" fill="#ffffff" stroke="#9bb8b2" stroke-width="2"/>
<text x="838" y="382" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="0" fill="#1c2f2b">Left-sidebar output and configuration panels</text>
<rect x="840" y="420" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="442" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">MCP packs</text>
<text x="1018" y="440" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Show remote pack resources when</text>
<text x="1018" y="457" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">VITE_MCP_BASE_URL is configured; Load replaces</text>
<text x="1018" y="474" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">current pack.</text>
<rect x="840" y="490" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="512" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">Collections</text>
<text x="1018" y="510" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Save current manual selection to IndexedDB-</text>
<text x="1018" y="527" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">backed named lists; reopen later.</text>
<rect x="840" y="560" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="582" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">Printing</text>
<text x="1018" y="580" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Print selected records with pack limit and print</text>
<text x="1018" y="597" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">templates.</text>
<rect x="840" y="630" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="652" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">AI export</text>
<text x="1018" y="650" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Copy or download current view JSON with full</text>
<text x="1018" y="667" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">records and selected/highlighted flags.</text>
<rect x="840" y="700" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="722" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">Tile text</text>
<text x="1018" y="720" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Choose title/subtitle fields, template title,</text>
<text x="1018" y="737" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">small ID badge, reset preferences.</text>
<rect x="840" y="770" width="660" height="50" rx="8" fill="#f7faf9" stroke="#c7d8d4" stroke-width="2"/>
<text x="862" y="792" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#1c2f2b">Editing</text>
<text x="1018" y="790" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">Readonly, prompted, or full modes; apply</text>
<text x="1018" y="807" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0" fill="#24413c">property/value to selected items.</text>
<rect x="54" y="930" width="1492" height="54" rx="10" fill="#eef5f2" stroke="#9bb8b2" stroke-width="2"/>
<text x="86" y="964" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#1c2f2b">Design implication for HMRC pack: keep the grid as the primary surface, and make side panels dense, persistent, and interaction-first.</text>
<text x="36" y="1016" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="0" fill="#526963">Source: original SeeLinks web UI, branch datapacks, commit 7983b2e; observed from docs/ui-current.md, docs/ui-current-callouts.md, docs/user-guide.md, and apps/web/src/routes/+page.svelte.</text>
</svg>
