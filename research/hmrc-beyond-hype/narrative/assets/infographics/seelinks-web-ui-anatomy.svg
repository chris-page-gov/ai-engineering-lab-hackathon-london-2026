<text x="548" y="238" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Title/count, mode description, Grid/Outline/Graph/Timeline/Reading tabs, dataset picker,</text>
<text x="548" y="257" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">JSON/JSONL/OpenAPI import, About intro launcher.</text>
