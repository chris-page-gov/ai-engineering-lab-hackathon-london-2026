<text x="1026" y="296" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#405a66">Choose highlighted | Choose unhighlighted | Undo | Reset</text>
<rect x="522" y="344" width="1008" height="64" rx="8" fill="#f3f6f5" stroke="#c2d1cf" stroke-width="2"/>
<text x="548" y="372" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#1c2f2b">Selection summary, collection profile, print status, view-history chips, import and service-worker messages.</text>
<rect x="522" y="430" width="1008" height="210" rx="8" fill="#fff7e8" stroke="#cfae6c" stroke-width="2"/>
<text x="548" y="462" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#1c2f2b">Docked detail panel</text>
<text x="548" y="490" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">Appears when an item is open. Includes a tile strip for stepping through the current view,</text>
<text x="548" y="509" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">optional rollup cards, detail title/subtitle, Previous/Next/Close, Overview and Images tabs,</text>
<text x="548" y="528" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#24413c">and pack-specific detail layouts.</text>
