<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<title>SeeLinks web UI anatomy</title>
<rect width="100%" height="100%" fill="#f7faf8"/>
<rect x="24" y="20" width="1552" height="78" rx="10" fill="#ffffff" stroke="#a9bdb8" stroke-width="2"/>
<text x="48" y="55" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="0" fill="#132f2a">SeeLinks Web UI Anatomy</text>
<text x="48" y="82" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0" fill="#3d5b55">Full-screen information browser: facet sidebar, view controls, tile grid, detail dock, and output tools.</text>
<rect x="38" y="122" width="420" height="800" rx="14" fill="#eef5f2" stroke="#8eb0a9" stroke-width="2"/>
<text x="64" y="156" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#1c2f2b">Left sidebar</text>
<rect x="62" y="178" width="372" height="100" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="206" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">Order by</text>
<text x="84" y="232" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Multi-facet sort stack; chip precedence,</text>
<text x="84" y="251" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">direction, legend include/exclude.</text>
<rect x="62" y="296" width="372" height="176" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="324" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">Facets</text>
<text x="84" y="350" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Open, pin, drag-reorder, auto-order values,</text>
<text x="84" y="369" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">click/right-click/double-click chips.</text>
<rect x="62" y="490" width="372" height="82" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="518" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">Links</text>
<text x="84" y="544" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Facet-driven related-value summary for quick</text>
<text x="84" y="563" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">highlighting.</text>
<rect x="62" y="590" width="372" height="86" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="618" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">MCP packs</text>
<text x="84" y="644" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Lists external MCP resources when configured;</text>
<text x="84" y="663" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">load switches pack.</text>
<rect x="62" y="694" width="372" height="122" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="722" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">Collections, print, AI export</text>
<text x="84" y="748" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Save selected items, reopen sets, print</text>
<text x="84" y="767" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">selection, copy or download AI JSON.</text>
<rect x="62" y="836" width="372" height="70" rx="8" fill="#ffffff" stroke="#bdd1cc" stroke-width="2"/>
<text x="84" y="864" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#1c2f2b">Tile text and editing</text>
<text x="84" y="890" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">Choose tile title/subtitle fields and apply</text>
<text x="84" y="909" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0" fill="#31504a">new facet values when editing is enabled.</text>
