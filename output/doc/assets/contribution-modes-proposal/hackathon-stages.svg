<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Hackathon contribution stages</title>
  <desc id="desc">A five stage hackathon flow from skim to stabilise, showing dominant contribution modes at each stage.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Bounded innovation flow</text>
  <text x="640" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">Hackathons keep exploratory freedom by naming the stage and the dominant mode.</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(70 220)">
      <rect width="190" height="145" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
      <text x="95" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#1e3a8a">Skim</text>
      <text x="95" y="86" text-anchor="middle" font-size="18" fill="#1e40af">understand assets</text>
      <text x="95" y="116" text-anchor="middle" font-size="18" fill="#1e40af">and constraints</text>
    </g>
    <g transform="translate(305 220)">
      <rect width="190" height="145" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
      <text x="95" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#14532d">Frame</text>
      <text x="95" y="86" text-anchor="middle" font-size="18" fill="#166534">define problem</text>
      <text x="95" y="116" text-anchor="middle" font-size="18" fill="#166534">and success</text>
    </g>
    <g transform="translate(540 220)">
      <rect width="190" height="145" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
      <text x="95" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#78350f">Spike</text>
      <text x="95" y="86" text-anchor="middle" font-size="18" fill="#92400e">try approaches</text>
      <text x="95" y="116" text-anchor="middle" font-size="18" fill="#92400e">quickly</text>
    </g>
    <g transform="translate(775 220)">
      <rect width="190" height="145" rx="12" fill="#fae8ff" stroke="#c026d3" stroke-width="3"/>
      <text x="95" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#701a75">Prove</text>
      <text x="95" y="86" text-anchor="middle" font-size="18" fill="#86198f">demonstrate</text>
      <text x="95" y="116" text-anchor="middle" font-size="18" fill="#86198f">with evidence</text>
    </g>
    <g transform="translate(1010 220)">
      <rect width="190" height="145" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
      <text x="95" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#075985">Stabilise</text>
      <text x="95" y="86" text-anchor="middle" font-size="18" fill="#0369a1">name controls</text>
      <text x="95" y="116" text-anchor="middle" font-size="18" fill="#0369a1">and next steps</text>
    </g>
    <g stroke="#475569" stroke-width="5" marker-end="url(#arrow)">
      <line x1="260" y1="292" x2="305" y2="292"/>
      <line x1="495" y1="292" x2="540" y2="292"/>
      <line x1="730" y1="292" x2="775" y2="292"/>
      <line x1="965" y1="292" x2="1010" y2="292"/>
    </g>
    <rect x="145" y="460" width="990" height="115" rx="14" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
    <text x="640" y="505" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Dominant modes shift through the day</text>
    <text x="640" y="545" text-anchor="middle" font-size="20" fill="#334155">Explorer and Framer early; Builder, Experience Shaper and Verifier during proof; Security Steward and Operator checks before continuation.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
