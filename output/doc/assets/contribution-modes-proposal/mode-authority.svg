<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Authority is granted by mode, environment and task</title>
  <desc id="desc">Diagram showing contribution mode, environment and task combining into authority, review and evidence obligations.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Authority follows the work being done</text>
  <text x="640" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">Contribution mode + environment + task determine permissions, review and evidence.</text>
  <g font-family="Arial, sans-serif">
    <rect x="80" y="215" width="280" height="150" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="220" y="270" text-anchor="middle" font-size="30" font-weight="700" fill="#1e3a8a">Mode</text>
    <text x="220" y="315" text-anchor="middle" font-size="21" fill="#1e40af">Explorer, Builder,</text>
    <text x="220" y="345" text-anchor="middle" font-size="21" fill="#1e40af">Verifier, Operator</text>
    <rect x="500" y="215" width="280" height="150" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="640" y="270" text-anchor="middle" font-size="30" font-weight="700" fill="#14532d">Environment</text>
    <text x="640" y="315" text-anchor="middle" font-size="21" fill="#166534">Sandbox, staging,</text>
    <text x="640" y="345" text-anchor="middle" font-size="21" fill="#166534">production</text>
    <rect x="920" y="215" width="280" height="150" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="1060" y="270" text-anchor="middle" font-size="30" font-weight="700" fill="#78350f">Task</text>
    <text x="1060" y="315" text-anchor="middle" font-size="21" fill="#92400e">Spike, refactor,</text>
    <text x="1060" y="345" text-anchor="middle" font-size="21" fill="#92400e">release, recover</text>
    <path d="M360 290 L500 290" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M780 290 L920 290" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M640 365 L640 455" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="285" y="455" width="710" height="170" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3"/>
    <text x="640" y="510" text-anchor="middle" font-size="31" font-weight="700" fill="#0f172a">Governance posture</text>
    <text x="640" y="555" text-anchor="middle" font-size="23" fill="#334155">permissions, approval, logging, evidence and review</text>
    <text x="640" y="590" text-anchor="middle" font-size="21" fill="#64748b">High freedom in sandboxes; stronger control near production.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
